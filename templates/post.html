<article class="post">
  <header class="post-header">
    <h1>{{title}}</h1>
    <div class="post-meta">
      <time datetime="{{date}}">{{dateDisplay}}</time>
      <span class="meta-sep">·</span>
      <span class="reading-time">{{readingTime}}</span>
    </div>
    <div class="tags">{{tags}}</div>
  </header>
  {{toc}}
  <div class="post-body">
    {{body}}
  </div>
  <nav class="post-nav">
    {{prevLink}}
    {{nextLink}}
  </nav>
</article>
